<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieMagic - Your Cinema Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated Background */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .background-image {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('../static/images/backgroundmovie booking.jpg') no-repeat center center;
            background-size: cover;
            filter: brightness(0.3) contrast(1.1);
            animation: zoomEffect 20s ease-in-out infinite alternate;
        }

        @keyframes zoomEffect {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* Gradient Overlay */
        .gradient-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(99, 102, 241, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                linear-gradient(180deg, 
                    rgba(15, 15, 26, 0.5) 0%, 
                    rgba(26, 26, 46, 0.6) 50%, 
                    rgba(15, 15, 26, 0.8) 100%);
        }

        /* Floating Orbs */
        .floating-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 15s infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: #6366f1;
            top: 10%;
            right: -100px;
            opacity: 0.3;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: #ec4899;
            bottom: 20%;
            left: -80px;
            opacity: 0.25;
            animation-delay: 5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.1); }
        }

        /* Top-Left Header */
        .profile-header {
            position: fixed;
            top: 30px;
            left: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            padding: 1rem 2rem;
            border-radius: 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.4);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .profile-header:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 12px 45px rgba(99, 102, 241, 0.6);
        }

        .profile-header span {
            color: white;
            font-weight: 800;
            font-size: 1.3em;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* Welcome Container */
        .welcome-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            max-width: 900px;
            padding: 3rem;
            animation: fadeInScale 1.5s ease-out;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .welcome-container h1 {
            font-size: 5rem;
            font-weight: 900;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-shadow: 
                0 0 30px rgba(99, 102, 241, 0.5),
                0 0 60px rgba(236, 72, 153, 0.3);
            background: linear-gradient(135deg, 
                #ffffff 0%, 
                #cbd5e1 25%, 
                #6366f1 50%, 
                #ec4899 75%, 
                #ffffff 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s ease-in-out infinite;
            font-family: 'Playfair Display', serif;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .welcome-container p {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 3rem;
            letter-spacing: 2px;
            font-weight: 400;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
        }

        /* Get Started Button */
        .get-started-button {
            padding: 1.2rem 3.5rem;
            font-size: 1.3em;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 8px 30px rgba(99, 102, 241, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
            text-decoration: none;
            display: inline-block;
            position: relative;
            overflow: hidden;
        }

        .get-started-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.3), 
                transparent);
            transition: 0.6s;
        }

        .get-started-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 
                0 15px 50px rgba(99, 102, 241, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .get-started-button:hover::before {
            left: 100%;
        }

        /* Film Strip Decoration */
        .film-strip {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30px;
            background: repeating-linear-gradient(
                90deg,
                #0f0f1a 0px,
                #0f0f1a 40px,
                #1a1a2e 40px,
                #1a1a2e 50px
            );
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .welcome-container h1 {
                font-size: 3.5rem;
                letter-spacing: 5px;
            }
        }

        @media (max-width: 768px) {
            .profile-header {
                padding: 0.8rem 1.5rem;
                left: 20px;
                top: 20px;
            }
            
            .profile-header span {
                font-size: 1rem;
                letter-spacing: 2px;
            }
            
            .welcome-container {
                padding: 2rem;
                width: 90%;
            }
            
            .welcome-container h1 {
                font-size: 2.5rem;
                letter-spacing: 3px;
            }
            
            .welcome-container p {
                font-size: 1.1rem;
            }
            
            .get-started-button {
                padding: 1rem 2.5rem;
                font-size: 1.1em;
            }
        }

        @media (max-width: 480px) {
            .welcome-container h1 {
                font-size: 1.8rem;
                letter-spacing: 2px;
            }
            
            .welcome-container p {
                font-size: 1rem;
            }
            
            .get-started-button {
                padding: 0.9rem 2rem;
                font-size: 1em;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="background-container">
        <div class="background-image"></div>
        <div class="gradient-overlay"></div>
        <div class="floating-orb orb-1"></div>
        <div class="floating-orb orb-2"></div>
    </div>

    <!-- Top-Left Header -->
    <div class="profile-header">
        <span>MovieMagic</span>
    </div>

    <!-- Center Content -->
    <div class="welcome-container">
        <h1>Your Cinema Experience</h1>
        <p>Discover blockbusters. Book seats. Enjoy the show.</p>
        <a href="{{ url_for('login') }}" class="get-started-button">
            Get Started
        </a>
    </div>

    <!-- Film Strip -->
    <div class="film-strip"></div>
</body>
</html>
