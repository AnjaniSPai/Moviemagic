<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - MovieMagic</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #e50914; 
            --bg-color: #ffffff;      
            --text-main: #121212;     
            --secondary-bg: #f8f9fa;  
            --glass-border: rgba(0, 0, 0, 0.1);
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* Navigation - Fixed relative to avoid overlap */
        nav {
            display: flex;
            justify-content: flex-end;
            padding: 1rem 3rem;
            background: rgba(255, 255, 255, 0.95);
            position: relative;
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
            -webkit-backdrop-filter: blur(8px); /* Safari support fix */
            backdrop-filter: blur(8px);
        }

        .nav-right a {
            color: var(--text-main);
            text-decoration: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            background: var(--secondary-bg);
            transition: 0.3s;
        }

        .nav-right a:hover {
            background: var(--primary-color);
            color: white;
        }

        .contact-container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 2rem;
        }

        .contact-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .contact-header h1 {
            color: var(--primary-color);
            font-size: 3rem;
        }

        .contact-header p {
            color: #555;
        }

        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
        }

        /* Form Styling - Fixed Accessibility Errors */
        .contact-form input, .contact-form textarea {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1.5rem;
            background: var(--secondary-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            outline: none;
            font-size: 1rem;
        }

        .contact-form input:focus { border: 1px solid var(--primary-color); }

        .submit-btn {
            background: var(--primary-color);
            color: white;
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(229, 9, 20, 0.3); }

        .contact-info {
            background: var(--secondary-bg);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
        }

        .info-item { display: flex; align-items: center; margin-bottom: 2rem; }
        .info-item i { font-size: 1.5rem; color: var(--primary-color); margin-right: 1.5rem; }

        @media (max-width: 768px) { .contact-wrapper { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav>
        <div class="nav-right">
            <a href="{{ url_for('home1') }}">Back to Home</a>
        </div>
    </nav>

    <div class="contact-container">
        <div class="contact-header">
            <h1>Get In Touch</h1>
            <p>Have questions about theaters in Ballari? We're here to help.</p>
        </div>

        <div class="contact-wrapper">
            <div class="contact-form">
                <form action="#" method="POST">
                    <input type="text" placeholder="Your Name" title="Enter your full name" required>
                    <input type="email" placeholder="Email Address" title="Enter your email" required>
                    <textarea rows="5" placeholder="Your Message" title="Type your message here" required></textarea>
                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>

            <div class="contact-info">
                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <div>
                        <strong>Our Location</strong>
                        <p>Ballari Engineering College Area, Ballari, KA</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <div>
                        <strong>Email Us</strong>
                        <p>support@moviemagic.in</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fas fa-phone"></i>
                    <div>
                        <strong>Call Support</strong>
                        <p>+91 80000*****</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
