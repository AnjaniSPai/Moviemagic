<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us - MovieMagic</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #e50914; /* Brand Red */
            --bg-color: #ffffff;      /* Aesthetic White */
            --text-main: #121212;     /* Onyx Black */
            --secondary-bg: #f8f9fa;  /* Snow Grey */
            --glass-border: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* Fixed Navigation */
        nav {
            display: flex;
            justify-content: flex-end;
            padding: 1rem 3rem;
            background: rgba(255, 255, 255, 0.95);
            position: relative;
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
            -webkit-backdrop-filter: blur(8px); /* Safari support fix */
            backdrop-filter: blur(8px);
        }

        .nav-right a {
            color: var(--text-main);
            text-decoration: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            background: var(--secondary-bg);
            transition: 0.3s;
        }

        .nav-right a:hover {
            background: var(--primary-color);
            color: white;
        }

        .about-container {
            max-width: 1100px;
            margin: 60px auto;
            padding: 2rem;
            text-align: center;
        }

        .about-card {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid var(--glass-border);
        }

        h1 {
            color: var(--primary-color);
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .icon-box {
            font-size: 4rem;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }

        p {
            line-height: 1.8;
            color: #555;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-right">
            <a href="{{ url_for('home1') }}">Back to Home</a>
        </div>
    </nav>

    <div class="about-container">
        <div class="about-card">
            <div class="icon-box">
                <i class="fas fa-film"></i>
            </div>
            <h1>Our Story</h1>
            <p>
                Launched in 2026 as a premier engineering project, **MovieMagic** was designed to solve the complexities of real-time seat booking. 
                Serving the **Ballari** region, we utilize **MongoDB Atlas** and **Flask** to provide a lightning-fast experience for every cinema lover.
            </p>
        </div>
    </div>
</body>
</html>
